name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Job 1: Build and Test ─────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ─── Job 2: Docker Build ───────────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build   # Only runs if build job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ecommerce-backend:${{ github.sha }} .
          echo "✅ Docker image built successfully"
          echo "Image tag: ecommerce-backend:${{ github.sha }}"

      - name: Check image size
        run: docker images ecommerce-backend

  # ─── Job 3: Deploy to Render ───────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker   # Only runs if docker job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          echo "✅ Deployment triggered on Render"
