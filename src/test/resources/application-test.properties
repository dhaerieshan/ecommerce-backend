# Test Profile Configuration
spring.application.name=ecommerce-test
server.port=8081
# Database - H2 In-Memory for testing
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=VALUE,RETURNING;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driverspring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.jdbc.use_returning_clause=false
# Logging - Reduced verbosity for tests
logging.level.root=WARN
logging.level.com.borneo.ecommerce=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
# Security - Test JWT Configuration
app.jwtSecret=test-secret-key-for-testing-purposes-must-be-minimum-256-bits-long-for-HS256
app.jwtExpirationMs=86400000
# Admin and Vendor Secret Codes
admin.secret.code=admin123
vendor.secret.code=vendor123
# Email Configuration - Mock SMTP for tests
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# File Upload Directory
app.upload.dir=/tmp/test-uploads/
# API Documentation
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method

