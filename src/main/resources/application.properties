spring.application.name=ecommerce
logging.level.root=INFO
logging.level.com.borneo.ecommerce=DEBUG
# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
# JWT
app.jwtSecret=${app.jwtSecret:local-dev-secret-key-change-in-production}
# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Role secret codes
admin.secret.code=${ADMIN_SECRET_CODE:admin123}
vendor.secret.code=${VENDOR_SECRET_CODE:vendor123}
# File upload
app.upload.dir=${APP_UPLOAD_DIR:/images/}
# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always