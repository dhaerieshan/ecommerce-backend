spring.application.name=ecommerce

logging.level.root=INFO
logging.level.com.borneo.ecommerce=DEBUG

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# JWT
app.jwtSecret=${app.jwtSecret:local-dev-secret-key-change-in-production}

# Role secret codes
admin.secret.code=${ADMIN_SECRET_CODE:admin123}
vendor.secret.code=${VENDOR_SECRET_CODE:vendor123}
# File upload
app.upload.dir=${APP_UPLOAD_DIR:/images/}
# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Swagger
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
# Actuator health check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always